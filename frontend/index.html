<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeanBotics</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>&#9749; BeanBotics</h1>
        <p class="tagline">AI-Powered Coffee, Perfectly Brewed</p>
    </header>

    <main>
        <section id="menu-section">
            <h2>Menu</h2>
            <div id="menu-list" class="menu-grid">
                <p class="loading">Loading menu...</p>
            </div>
        </section>

        <section id="orders-section">
            <h2>Order Queue</h2>
            <div id="orders-list">
                <p class="empty-state">No orders yet. Pick a drink from the menu!</p>
            </div>
        </section>
    </main>

    <footer>
        <p>BeanBotics Corporation &mdash; Spec-Driven Development Lab</p>
    </footer>

    <script src="/static/script.js"></script>
</body>
</html>
